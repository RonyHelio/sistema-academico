version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sistema-academico-db
    environment:
      POSTGRES_USER: ${USUARIO:-postgres}
      POSTGRES_PASSWORD: ${SENHA:-postgres}
      POSTGRES_DB: projeto_academico
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./sistema-academico
      dockerfile: Dockerfile
    container_name: sistema-academico-backend
    environment:
      # Sobrescreve a URL do banco para apontar para o container 'db' e não para o 'localhost' interno do container
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/projeto_academico
      - USUARIO=${USUARIO:-postgres}
      - SENHA=${SENHA:-postgres}
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sistema-academico-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
